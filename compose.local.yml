services:
  postgres:
    image: postgres:16-alpine
    container_name: stock-exchange-postgres
    environment:
      POSTGRES_DB: stock_exchange
      POSTGRES_USER: stock_exchange
      POSTGRES_PASSWORD: stock_exchange
    ports:
      - "${EXCHANGE_POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_exchange -d stock_exchange"]
      interval: 10s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
    container_name: stock-exchange-be
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: "3000"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stock_exchange
      SPRING_DATASOURCE_USERNAME: stock_exchange
      SPRING_DATASOURCE_PASSWORD: stock_exchange
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      EXCHANGE_AUTH_TOKEN_SIGNING_KEY: local-dev-token-signing-key-change-before-prod
      EXCHANGE_AUTH_ACCESS_TOKEN_TTL: 12h
      EXCHANGE_AUTH_REFRESH_TOKEN_TTL: 14d
      HANA_OMNILENS_API_BASE_URL: http://host.docker.internal:8080
      HANA_OMNILENS_API_KEY: ""
      HANA_OMNILENS_API_STREAM_QUOTE_ENABLED: "true"
      HANA_OMNILENS_API_STREAM_QUOTE_PATH: /ws/market/quotes
      HANA_OMNILENS_API_STREAM_QUOTE_CURRENCY: USD
      HANA_OMNILENS_API_STREAM_QUOTE_REPLAY_ENABLED: "true"
      HANA_OMNILENS_API_STREAM_ALERT_ENABLED: "false"
      HANA_OMNILENS_API_STREAM_ALERT_PATH: /ws/alerts/events
      HANA_OMNILENS_API_STREAM_ALERT_REPLAY_ENABLED: "true"
      HANA_OMNILENS_API_STREAM_RECONNECT_INITIAL_DELAY: 1s
      HANA_OMNILENS_API_STREAM_RECONNECT_MAX_DELAY: 30s
      HANA_OMNILENS_API_STREAM_BACKPRESSURE_BUFFER_SIZE: "1000"
      HANA_OMNILENS_API_STREAM_DRAIN_INTERVAL: 50ms
      HANA_OMNILENS_QUOTE_SNAPSHOT_RELAY_ENABLED: "false"
      HANA_OMNILENS_QUOTE_RELAY_STOCK_CODES: "005930,000660,035720,035420,005380,000270,068270,105560,055550,086790"
      HANA_OMNILENS_QUOTE_RELAY_INTERVAL: 5s
      EXCHANGE_TAX_DOCUMENT_STORAGE_ROOT: /app/data/tax-documents
      EXCHANGE_NOTIFICATION_PUSH_ENABLED_PROVIDERS: LOCAL_NOOP_PUSH
      EXCHANGE_NOTIFICATION_PUSH_TOKEN_ENCRYPTION_KEY: ""
      EXCHANGE_NOTIFICATION_PUSH_FCM_PROJECT_ID: ""
      EXCHANGE_NOTIFICATION_PUSH_FCM_ACCESS_TOKEN: ""
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 20
