services:
  api:
    build:
      context: .
    container_name: stock-exchange-be
    environment:
      SERVER_PORT: "3000"
      EXCHANGE_AUTH_TOKEN_SIGNING_KEY: local-dev-token-signing-key-change-before-prod
      EXCHANGE_AUTH_ACCESS_TOKEN_TTL: 12h
      EXCHANGE_AUTH_REFRESH_TOKEN_TTL: 14d
      HANA_OMNILENS_API_BASE_URL: http://host.docker.internal:8080
      HANA_OMNILENS_API_KEY: ""
      HANA_OMNILENS_QUOTE_STREAM_ENABLED: "false"
      HANA_OMNILENS_QUOTE_STREAM_PATH: /ws/market/quotes
      HANA_OMNILENS_QUOTE_STREAM_CURRENCY: USD
      HANA_OMNILENS_QUOTE_STREAM_REPLAY_ENABLED: "true"
      HANA_OMNILENS_ALERT_STREAM_ENABLED: "false"
      HANA_OMNILENS_ALERT_STREAM_PATH: /ws/alerts/events
      HANA_OMNILENS_ALERT_STREAM_REPLAY_ENABLED: "true"
      HANA_OMNILENS_STREAM_RECONNECT_INITIAL_DELAY: 1s
      HANA_OMNILENS_STREAM_RECONNECT_MAX_DELAY: 30s
      HANA_OMNILENS_STREAM_BACKPRESSURE_BUFFER_SIZE: "1000"
      HANA_OMNILENS_STREAM_DRAIN_INTERVAL: 50ms
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 20
