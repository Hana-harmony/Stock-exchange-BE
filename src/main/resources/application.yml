spring:
  application:
    name: stock-exchange-be
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stock_exchange}
    username: ${SPRING_DATASOURCE_USERNAME:stock_exchange}
    password: ${SPRING_DATASOURCE_PASSWORD:stock_exchange}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

exchange:
  cors:
    allowed-origins: ${EXCHANGE_CORS_ALLOWED_ORIGINS:http://localhost:15100,http://127.0.0.1:15100,http://localhost:3000,http://127.0.0.1:3000}
    allowed-methods: ${EXCHANGE_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${EXCHANGE_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Requested-With}
    allow-credentials: ${EXCHANGE_CORS_ALLOW_CREDENTIALS:true}
    max-age: ${EXCHANGE_CORS_MAX_AGE:1h}
  auth:
    token-signing-key: ${EXCHANGE_AUTH_TOKEN_SIGNING_KEY:local-dev-token-signing-key-change-before-prod}
    access-token-ttl: ${EXCHANGE_AUTH_ACCESS_TOKEN_TTL:12h}
    refresh-token-ttl: ${EXCHANGE_AUTH_REFRESH_TOKEN_TTL:14d}
  notification:
    push:
      worker-enabled: ${EXCHANGE_NOTIFICATION_PUSH_WORKER_ENABLED:false}
      batch-size: ${EXCHANGE_NOTIFICATION_PUSH_BATCH_SIZE:50}
      max-attempt-count: ${EXCHANGE_NOTIFICATION_PUSH_MAX_ATTEMPT_COUNT:3}
      fixed-delay: ${EXCHANGE_NOTIFICATION_PUSH_FIXED_DELAY:30s}
      enabled-providers: ${EXCHANGE_NOTIFICATION_PUSH_ENABLED_PROVIDERS:LOCAL_NOOP_PUSH}
      token-vault:
        encryption-key: ${EXCHANGE_NOTIFICATION_PUSH_TOKEN_ENCRYPTION_KEY:}
      fcm:
        project-id: ${EXCHANGE_NOTIFICATION_PUSH_FCM_PROJECT_ID:}
        access-token: ${EXCHANGE_NOTIFICATION_PUSH_FCM_ACCESS_TOKEN:}
        send-base-url: ${EXCHANGE_NOTIFICATION_PUSH_FCM_SEND_BASE_URL:https://fcm.googleapis.com}
      apns:
        bearer-token: ${EXCHANGE_NOTIFICATION_PUSH_APNS_BEARER_TOKEN:}
        topic: ${EXCHANGE_NOTIFICATION_PUSH_APNS_TOPIC:}
        send-base-url: ${EXCHANGE_NOTIFICATION_PUSH_APNS_SEND_BASE_URL:https://api.push.apple.com}
      web-push:
        gateway-base-url: ${EXCHANGE_NOTIFICATION_PUSH_WEB_GATEWAY_BASE_URL:}
        gateway-api-key: ${EXCHANGE_NOTIFICATION_PUSH_WEB_GATEWAY_API_KEY:}
        send-path: ${EXCHANGE_NOTIFICATION_PUSH_WEB_SEND_PATH:/send}
        vapid-subject: ${EXCHANGE_NOTIFICATION_PUSH_WEB_VAPID_SUBJECT:}
        vapid-public-key: ${EXCHANGE_NOTIFICATION_PUSH_WEB_VAPID_PUBLIC_KEY:}
        vapid-private-key: ${EXCHANGE_NOTIFICATION_PUSH_WEB_VAPID_PRIVATE_KEY:}
  audit:
    retention-days: ${EXCHANGE_AUDIT_RETENTION_DAYS:365}
    retention-worker-enabled: ${EXCHANGE_AUDIT_RETENTION_WORKER_ENABLED:false}
    retention-fixed-delay: ${EXCHANGE_AUDIT_RETENTION_FIXED_DELAY:24h}
  tax:
    document-storage:
      root-path: ${EXCHANGE_TAX_DOCUMENT_STORAGE_ROOT:build/local-tax-document-storage}
      max-file-size-bytes: ${EXCHANGE_TAX_DOCUMENT_MAX_FILE_SIZE_BYTES:10485760}
  rate-limit:
    enabled: ${EXCHANGE_RATE_LIMIT_ENABLED:false}
    max-requests: ${EXCHANGE_RATE_LIMIT_MAX_REQUESTS:120}
    window: ${EXCHANGE_RATE_LIMIT_WINDOW:1m}

hana:
  omnilens:
    api:
      base-url: ${HANA_OMNILENS_API_BASE_URL:http://localhost:8080}
      api-key: ${HANA_OMNILENS_API_KEY:}
      quote-cache-ttl: ${HANA_OMNILENS_QUOTE_CACHE_TTL:20s}
      quote-cache-stale-ttl: ${HANA_OMNILENS_QUOTE_CACHE_STALE_TTL:10m}
      retry:
        enabled: ${HANA_OMNILENS_REST_RETRY_ENABLED:true}
        max-attempts: ${HANA_OMNILENS_REST_RETRY_MAX_ATTEMPTS:3}
        initial-delay: ${HANA_OMNILENS_REST_RETRY_INITIAL_DELAY:100ms}
        max-delay: ${HANA_OMNILENS_REST_RETRY_MAX_DELAY:1s}
      stream:
        quote-enabled: ${HANA_OMNILENS_QUOTE_STREAM_ENABLED:true}
        quote-path: ${HANA_OMNILENS_QUOTE_STREAM_PATH:/ws/market/quotes}
        quote-currency: ${HANA_OMNILENS_QUOTE_STREAM_CURRENCY:USD}
        quote-replay-enabled: ${HANA_OMNILENS_QUOTE_STREAM_REPLAY_ENABLED:true}
        index-enabled: ${HANA_OMNILENS_INDEX_STREAM_ENABLED:true}
        index-path: ${HANA_OMNILENS_INDEX_STREAM_PATH:/ws/market/indices}
        index-replay-enabled: ${HANA_OMNILENS_INDEX_STREAM_REPLAY_ENABLED:true}
        alert-enabled: ${HANA_OMNILENS_ALERT_STREAM_ENABLED:true}
        alert-path: ${HANA_OMNILENS_ALERT_STREAM_PATH:/ws/alerts/events}
        alert-replay-enabled: ${HANA_OMNILENS_ALERT_STREAM_REPLAY_ENABLED:true}
        reconnect-initial-delay: ${HANA_OMNILENS_STREAM_RECONNECT_INITIAL_DELAY:1s}
        reconnect-max-delay: ${HANA_OMNILENS_STREAM_RECONNECT_MAX_DELAY:30s}
        backpressure-buffer-size: ${HANA_OMNILENS_STREAM_BACKPRESSURE_BUFFER_SIZE:1000}
        drain-interval: ${HANA_OMNILENS_STREAM_DRAIN_INTERVAL:50ms}
