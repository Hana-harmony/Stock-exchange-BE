spring:
  application:
    name: stock-exchange-be-test
  datasource:
    url: jdbc:h2:mem:stock_exchange_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

exchange:
  auth:
    token-signing-key: local-test-token-signing-key
    access-token-ttl: 12h
    refresh-token-ttl: 14d

hana:
  omnilens:
    api:
      base-url: http://localhost:8080
      api-key: ""
      quote-cache-ttl: 0s
      quote-cache-stale-ttl: 0s
      stream:
        quote-enabled: false
        quote-path: /ws/market/quotes
        quote-currency: USD
        quote-replay-enabled: true
        alert-enabled: false
        alert-path: /ws/alerts/events
        alert-replay-enabled: true
        reconnect-initial-delay: 1s
        reconnect-max-delay: 30s
        backpressure-buffer-size: 1000
        drain-interval: 50ms
